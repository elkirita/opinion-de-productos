name: Deploy to AKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Descargar código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Instalar Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Compilar proyecto
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4️⃣ Login DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Construir imagen con tag único
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/micro-opiniones:${{ github.sha }} .

      # 6️⃣ Subir imagen
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/micro-opiniones:${{ github.sha }}

      # 7️⃣ Login Azure
      - name: Azure Login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 8️⃣ Set AKS context
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AZURE_CLUSTER_NAME }}

      # 9️⃣ Actualizar imagen en el deployment
      - name: Update deployment image
        run: |
          kubectl set image deployment/micro-opiniones \
          micro-opiniones=${{ secrets.DOCKER_USERNAME }}/micro-opiniones:${{ github.sha }}

      # 🔟 Verificar despliegue
      - name: Verify rollout
        run: kubectl rollout status deployment/micro-opiniones