<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Opiniones</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      width: 95%;
      max-width: 950px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e3c72;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #f1f3f6;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    tr:hover {
      background: #eef3ff;
    }

    .edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #2a5298;
      transition: 0.2s;
    }

    .edit-btn:hover {
      transform: scale(1.2);
      color: #1e3c72;
    }

    /* PAGINACIÓN */
    .pagination {
      margin-top: 20px;
      text-align: center;
    }

    .pagination button {
      margin: 3px;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e0e0e0;
    }

    .pagination button.active {
      background: #2a5298;
      color: white;
    }

    .pagination button:hover {
      background: #2a5298;
      color: white;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      width: 400px;
      border-radius: 15px;
      animation: aparecer 0.25s ease;
    }

    .modal-content h3 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      margin-top: 10px;
    }

    .modal-buttons {
      margin-top: 15px;
      text-align: right;
    }

    .save {
      background: #2a5298;
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .cancel {
      background: #ccc;
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
    }

    .success {
      color: green;
      font-size: 14px;
      margin-top: 10px;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Lista de Productos</h2>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Producto</th>
      <th>Acción</th>
    </tr>
    </thead>
    <tbody id="tablaProductos"></tbody>
  </table>

  <div class="pagination" id="paginacion"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modalOpinion">
  <div class="modal-content">
    <h3>Escribir Opinión</h3>
    <p id="nombreProducto"></p>
    <textarea id="textoOpinion" rows="4"></textarea>

    <div class="modal-buttons">
      <button class="cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="save" onclick="guardarOpinion()">Guardar</button>
    </div>

    <div class="success" id="mensajeExito"></div>
  </div>
</div>

<script>
  let productos = [];
  let paginaActual = 1;
  let productoSeleccionado = null;
  const productosPorPagina = 10;

  async function cargarProductos() {
    const res = await fetch("/api/productos");
    productos = await res.json();
    mostrarPagina(1);
  }

  function mostrarPagina(pagina) {
    paginaActual = pagina;
    const tabla = document.getElementById("tablaProductos");
    tabla.innerHTML = "";

    const inicio = (pagina - 1) * productosPorPagina;
    const fin = inicio + productosPorPagina;
    const productosPagina = productos.slice(inicio, fin);

    productosPagina.forEach(prod => {
      const fila = document.createElement("tr");
      fila.innerHTML = `
        <td>${prod.id_producto}</td>
        <td>${prod.nombre}</td>
        <td>
          <button class="edit-btn" onclick="abrirModal(${prod.id_producto}, '${prod.nombre}')">
            <i class="fa-solid fa-pen"></i>
          </button>
        </td>
      `;
      tabla.appendChild(fila);
    });

    generarPaginacion();
  }

  function generarPaginacion() {
    const totalPaginas = Math.ceil(productos.length / productosPorPagina);
    const contenedor = document.getElementById("paginacion");
    contenedor.innerHTML = "";

    if (paginaActual > 1) {
      contenedor.innerHTML += `<button onclick="mostrarPagina(${paginaActual - 1})">&lt;</button>`;
    }

    for (let i = 1; i <= totalPaginas; i++) {
      contenedor.innerHTML += `
        <button class="${i === paginaActual ? 'active' : ''}"
        onclick="mostrarPagina(${i})">${i}</button>
      `;
    }

    if (paginaActual < totalPaginas) {
      contenedor.innerHTML += `<button onclick="mostrarPagina(${paginaActual + 1})">&gt;</button>`;
    }
  }

  function abrirModal(id, nombre) {
    productoSeleccionado = id;
    document.getElementById("nombreProducto").innerText = nombre;
    document.getElementById("textoOpinion").value = "";
    document.getElementById("mensajeExito").innerText = "";
    document.getElementById("modalOpinion").style.display = "flex";
  }

  function cerrarModal() {
    document.getElementById("modalOpinion").style.display = "none";
  }

  async function guardarOpinion() {
    const opinion = document.getElementById("textoOpinion").value;

    await fetch("/opinion", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        id_producto: productoSeleccionado,
        comentario: opinion
      })
    });

    document.getElementById("mensajeExito").innerText = "Opinión enviada correctamente ✅";
  }

  cargarProductos();
</script>

</body>
</html>
