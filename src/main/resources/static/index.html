<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Opiniones</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      width: 95%;
      max-width: 900px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #1e3c72;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #f1f3f6;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    tr:hover {
      background: #eef3ff;
    }

    .edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #2a5298;
      transition: 0.2s;
    }

    .edit-btn:hover {
      transform: scale(1.2);
      color: #1e3c72;
    }

    /* PAGINACIÓN */
    .pagination {
      margin-top: 20px;
      text-align: center;
    }

    .pagination button {
      margin: 3px;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #e0e0e0;
    }

    .pagination button.active {
      background: #2a5298;
      color: white;
    }

    .pagination button:hover {
      background: #2a5298;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Lista de Productos</h2>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Producto</th>
      <th>Acción</th>
    </tr>
    </thead>
    <tbody id="tablaProductos"></tbody>
  </table>

  <div class="pagination" id="paginacion"></div>
</div>

<script>
  let productos = [];
  let paginaActual = 1;
  const productosPorPagina = 10;

  async function cargarProductos() {
    const res = await fetch("/api/productos");
    productos = await res.json();
    mostrarPagina(1);
  }

  function mostrarPagina(pagina) {
    paginaActual = pagina;
    const tabla = document.getElementById("tablaProductos");
    tabla.innerHTML = "";

    const inicio = (pagina - 1) * productosPorPagina;
    const fin = inicio + productosPorPagina;
    const productosPagina = productos.slice(inicio, fin);

    productosPagina.forEach(prod => {
      const fila = document.createElement("tr");
      fila.innerHTML = `
        <td>${prod.id_producto}</td>
        <td>${prod.nombre}</td>
        <td>
          <button class="edit-btn">
            <i class="fa-solid fa-pen"></i>
          </button>
        </td>
      `;
      tabla.appendChild(fila);
    });

    generarPaginacion();
  }

  function generarPaginacion() {
    const totalPaginas = Math.ceil(productos.length / productosPorPagina);
    const contenedor = document.getElementById("paginacion");
    contenedor.innerHTML = "";

    if (paginaActual > 1) {
      contenedor.innerHTML += `<button onclick="mostrarPagina(${paginaActual - 1})">&lt;</button>`;
    }

    for (let i = 1; i <= totalPaginas; i++) {
      contenedor.innerHTML += `
        <button class="${i === paginaActual ? 'active' : ''}"
        onclick="mostrarPagina(${i})">${i}</button>
      `;
    }

    if (paginaActual < totalPaginas) {
      contenedor.innerHTML += `<button onclick="mostrarPagina(${paginaActual + 1})">&gt;</button>`;
    }
  }

  cargarProductos();
</script>

</body>
</html>
